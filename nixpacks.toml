# Railway / Nixpacks build config for Puppeteer.
#
# Railway's Nixpacks base image is Ubuntu-based, where:
#   - the `chromium` apt package is a broken snap stub (doesn't run in containers)
#   - the Nix `chromium` package doesn't reliably land on PATH at runtime
#
# The proven approach (see github.com/ryannono/Puppeteer-Railway-Buildpack):
#   1. apt-install the shared LIBRARIES Chrome links against (Ubuntu lacks them)
#   2. let Puppeteer download + use its OWN bundled Chromium
#   3. pin the cache dir to /app/.cache/puppeteer so the download (build phase)
#      persists into the runtime image, and runtime looks in the same place.

[phases.setup]
nixPkgs = ["..."]
aptPkgs = [
  "fonts-liberation",
  "libappindicator3-1",
  "libasound2",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libgbm1",
  "libgtk-3-0",
  "libnspr4",
  "libnss3",
  "libx11-xcb1",
  "libxcomposite1",
  "libxcursor1",
  "libxdamage1",
  "libxfixes3",
  "libxi6",
  "libxrandr2",
  "libxss1",
  "libxtst6",
  "xdg-utils"
]

[variables]
# Pin Puppeteer's browser cache to a path INSIDE /app so the Chromium
# downloaded during the build (postinstall) persists into the runtime image.
# Both the download and the runtime launch read this same variable.
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"
