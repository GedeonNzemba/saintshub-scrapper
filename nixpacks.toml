# Railway / Nixpacks build config.
#
# We install a SYSTEM Chromium (plus the fonts/libs it needs) via Nix.
# Puppeteer is told to use it at runtime by puppeteerHelper.ts, which finds
# the binary in the Nix store at runtime.
#
# We do NOT rely on Puppeteer's bundled Chromium download here, because that
# download does not reliably persist between Railway's build and run phases.
#
# NOTE: these must be valid nixpkgs attribute names (NOT apt/Debian names).
#   cacert         = CA certificates (apt calls it ca-certificates)
#   liberation_ttf = Liberation fonts (apt calls it ttf-liberation)

[phases.setup]
nixPkgs = [
  "...",
  "chromium",
  "nss",
  "freetype",
  "harfbuzz",
  "cacert",
  "liberation_ttf"
]

[variables]
# Skip Puppeteer's own Chromium download during npm install on Railway —
# we use the Nix system Chromium instead. (Local dev still downloads it.)
PUPPETEER_SKIP_DOWNLOAD = "true"
